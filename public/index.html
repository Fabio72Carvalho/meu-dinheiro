<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Dinheiro - Login</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <section id="view-login" class="login-container">

        <div class="logo-area">
            <div class="logo-area">
                <div class="logo-placeholder">
                    <img src="/favicon.ico" alt="Logo Meu Dinheiro" class="logo-img">
                </div>
                <h1 id="form-title">Meu Dinheiro</h1>
            </div>
            <p id="form-subtitle" class="subtitle">Acesse sua conta para continuar</p>
        </div>

        <form id="auth-form" data-mode="login">

            <div class="form-group" id="name-field">
                <label for="nome">Informe o nome</label>
                <input type="text" id="nome" placeholder="Como quer ser chamado?">
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>

            <div class="button-group-login">
                <button type="submit" class="btn-login" id="main-btn">
                    <span class="btn-text">Entrar</span>
                    <div class="spinner"></div>
                </button>
                <button type="button" class="btn-register" id="switch-btn">Cadastrar-me</button>
            </div>

        </form>

        <div id="user-info" style="display: none;">
            <p>Bem-vindo, <span id="user-display-name"></span>!</p>
            <button id="btn-sair">Sair</button>
        </div>

        <p id="mensagem"></p>
    </section>

    <section id="view-dashboard" class="dashboard-container" style="display: none;">
    </section>

    <script type="module" src="js/app.js"></script>

</body>

</html>
