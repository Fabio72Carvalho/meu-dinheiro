<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Dinheiro - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="login-container">
        <div class="logo-area">
            <!-- Substitua pelo seu <img> se preferir -->
            <div class="logo-placeholder">$</div>
            <h1 id="form-title">Meu Dinheiro</h1>
            <p id="form-subtitle" class="subtitle">Acesse sua conta para continuar</p>
        </div>

        <div id="login-form">
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="text" id="nome" placeholder="Seu Nome">
            <input type="password" id="senha" placeholder="Senha" required>

            <button id="btn-cadastrar">Criar Conta</button>
            <button id="btn-login">Entrar</button>
        </div>

        <div id="user-info" style="display: none;">
            <p>Bem-vindo, <span id="user-display-name"></span>!</p>
            <button id="btn-sair">Sair</button>
        </div>

        <p id="mensagem"></p>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
